            const sentences = questionText.split('\n').flatMap(line => line.match(/[^。？！…，,]+([。？！…，,]|…{2,})?/g) || [line]);

             sentences.forEach((sText, i) => {
                if (sText.trim() === '') return;
                const sentenceSpan = document.createElement('span');
                sentenceSpan.textContent = sText;
                if (question.options === null) {
                    sentenceSpan.classList.add('non-option');
                    sentenceSpan.addEventListener('click', (event) => {
                        speakAndHighlight(event.currentTarget.textContent, event.currentTarget);
                    });
                } else {
                     sentenceSpan.addEventListener('click', (event) => {
                        speakAndHighlight(event.currentTarget.textContent, event.currentTarget);
                    });
                }
                questionEl.appendChild(sentenceSpan);
                if (i < sentences.length -1 && question.question.includes('\n')) {
                    questionEl.appendChild(document.createElement('br'));
                }
            });


            optionsEl.innerHTML = '';
            if (question.options && question.options.length > 0) {
                question.options.forEach((optionText, index) => {
                    const li = document.createElement('li');
                    li.textContent = optionText;
                    li.className = 'option-item';
                    
                    if (question.spokenOptions && question.spokenOptions[index]) {
                        li.dataset.speak = question.spokenOptions[index];
                    }

                    li.addEventListener('click', (event) => {
                        const textToSpeak = event.currentTarget.dataset.speak || event.currentTarget.textContent;
                        speakAndHighlight(textToSpeak, event.currentTarget);
                    });
                    optionsEl.appendChild(li);
                });
            }

            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === questions.length - 1;
            selectEl.value = index;
        }

        // --- Event Listeners ---
        prevBtn.addEventListener('click', () => {
            synth.cancel();
            document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion(currentQuestionIndex);
            }
        });

        nextBtn.addEventListener('click', () => {
            synth.cancel();
            document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion(currentQuestionIndex);
            }
        });
        
        replayBtn.addEventListener('click', () => {
            const question = questions[currentQuestionIndex];
            let preambleText = question.preamble || '';

            const optionsText = question.spokenOptions ? question.spokenOptions.join('， ') : (question.options ? question.options.join('， ') : '');
            const textToSpeak = `${preambleText} ${question.question}。 選項有： ${optionsText}`;
            speak(textToSpeak);
        });

        selectEl.addEventListener('change', (e) => {
            synth.cancel();
            document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
            currentQuestionIndex = parseInt(e.target.value, 10);
            renderQuestion(currentQuestionIndex);
        });
        
        voiceSelectEl.addEventListener('change', () => {
            const selectedVoiceIndex = voiceSelectEl.value;
            if (voices[selectedVoiceIndex]) utterance.voice = voices[selectedVoiceIndex];
        });

        speedControl.addEventListener('input', (e) => {
            const speed = parseFloat(e.target.value);
            utterance.rate = speed;
            speedValue.textContent = `${speed.toFixed(1)}x`;
            if (synth.speaking) {
                speak(utterance.text); // Respeak with new speed
            }
        });

        downloadBtn.addEventListener('click', () => {
            const docClone = document.cloneNode(true);
            const htmlContent = docClone.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '報讀-逐句點選版.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        });

        function init() {
            selectEl.innerHTML = '';
            let currentSection = "";
            let currentOptgroup = null;

            questions.forEach((q, index) => {
                if (q.section !== currentSection) {
                    currentSection = q.section;
                    currentOptgroup = document.createElement('optgroup');
                    currentOptgroup.label = currentSection;
                    selectEl.appendChild(currentOptgroup);
                }
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${q.section} 第 ${q.displayId} 題`;
                if (currentOptgroup) currentOptgroup.appendChild(option);
            });

            // Set the main title's paragraph to be empty
            const headerParagraph = document.querySelector('header p');
            if (headerParagraph) {
                headerParagraph.textContent = '';
            }

            populateVoiceList(); 
            renderQuestion(currentQuestionIndex);
        }

        init();
    </script>

</body></html>
